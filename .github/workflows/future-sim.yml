name: Future Sim CI/CD

on:
  push:
    branches: [master, main]
    paths:
      - 'apps/future-sim/**'
      - '.github/workflows/future-sim.yml'
  pull_request:
    branches: [master, main]
    paths:
      - 'apps/future-sim/**'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/imagebrewing-future-sim

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/future-sim

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/future-sim/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: future-sim-dist
          path: apps/future-sim/dist/
          retention-days: 7

  docker:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: future-sim-dist
          path: apps/future-sim/dist/
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=v
            type=raw,value=latest,enable={{is_default_branch}}
      - uses: docker/build-push-action@v5
        with:
          context: apps/future-sim
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    needs: docker
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Future Sim Build" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ needs.docker.result }}" == "success" ]]; then
            echo "✅ Built and pushed to ghcr.io" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Build failed" >> $GITHUB_STEP_SUMMARY
          fi
