<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Quant Assistant</title>
<style>
:root{--bg:#0B1020;--card:#121A2C;--border:#26324A;--text:#E5E7EB;--muted:#94A3B8;--red:#EF4444;--green:#22C55E;--yellow:#F59E0B;--blue:#3B82F6;--purple:#8B5CF6;--gray:#64748B;--card-hover:#1A2540}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
.header{background:var(--card);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;position:sticky;top:0;z-index:100}
.header-left{display:flex;align-items:center;gap:16px}
.logo{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-time{color:var(--muted);font-size:13px}
.market-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.market-open{background:rgba(34,197,94,.15);color:var(--green)}
.market-closed{background:rgba(100,116,139,.15);color:var(--gray)}
.market-night{background:rgba(245,158,11,.15);color:var(--yellow)}
.stats-bar{display:flex;gap:20px;flex-wrap:wrap}
.stat-item{display:flex;flex-direction:column;align-items:center}
.stat-num{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.stat-num.green{color:var(--green)}.stat-num.red{color:var(--red)}.stat-num.yellow{color:var(--yellow)}.stat-num.blue{color:var(--blue)}.stat-num.gray{color:var(--gray)}
.risk-badge{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.risk-normal{background:rgba(34,197,94,.15);color:var(--green)}
.risk-warning{background:rgba(245,158,11,.15);color:var(--yellow)}
.risk-blocked{background:rgba(239,68,68,.15);color:var(--red)}
.main{display:grid;grid-template-columns:380px 1fr;gap:0;height:calc(100vh - 80px)}
.sidebar{border-right:1px solid var(--border);overflow-y:auto;display:flex;flex-direction:column}
.toolbar{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:8px}
.search-box{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;outline:none}
.search-box:focus{border-color:var(--blue)}
.filter-row{display:flex;gap:4px;flex-wrap:wrap}
.filter-btn{padding:4px 10px;border-radius:12px;font-size:11px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.filter-btn:hover{border-color:var(--blue);color:var(--blue)}
.filter-btn.active{background:var(--blue);color:white;border-color:var(--blue)}
.opp-list{flex:1;overflow-y:auto}
.opp-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .2s;display:grid;grid-template-columns:1fr auto;gap:4px;align-items:center}
.opp-item:hover{background:var(--card-hover)}
.opp-item.selected{background:rgba(59,130,246,.1);border-left:3px solid var(--blue)}
.opp-symbol{font-weight:700;font-size:15px}
.opp-dir{font-size:12px;color:var(--muted)}
.opp-right{text-align:right}
.opp-score{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums}
.opp-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.content{overflow-y:auto;padding:20px 24px}
.detail-empty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:16px}
.detail-card{max-width:900px}
.detail-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px}
.detail-title{font-size:24px;font-weight:700}
.detail-meta{display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.detail-price{font-size:32px;font-weight:700;font-variant-numeric:tabular-nums}
.section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;transition:border-color .2s}
.section:hover{border-color:rgba(255,255,255,.12)}
.section-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;font-weight:600}
.row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px}
.row .label{color:var(--muted)}
.row .value{font-weight:600;font-variant-numeric:tabular-nums}
.value.green{color:var(--green)}.value.red{color:var(--red)}.value.yellow{color:var(--yellow)}.value.blue{color:var(--blue)}.value.gray{color:var(--gray)}
.range-bar{position:relative;height:32px;background:var(--bg);border-radius:8px;margin:12px 0;overflow:visible}
.range-fill{position:absolute;height:100%;background:linear-gradient(90deg,rgba(239,68,68,.2),rgba(59,130,246,.3),rgba(34,197,94,.2));border-radius:8px}
.range-marker{position:absolute;top:-2px;width:3px;height:36px;background:var(--text);border-radius:2px;z-index:2}
.range-label{position:absolute;top:36px;font-size:11px;color:var(--muted);transform:translateX(-50%);white-space:nowrap}
.score-bar-wrap{margin:8px 0}
.score-bar-label{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.score-bar{height:8px;background:var(--bg);border-radius:4px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:4px;transition:width .5s}
.final-box{padding:16px;border-radius:12px;font-size:14px;line-height:1.8}
.final-buy{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:var(--red)}
.final-sell{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);color:var(--green)}
.final-watch{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2);color:var(--yellow)}
.final-none{background:rgba(100,116,139,.08);border:1px solid rgba(100,116,139,.2);color:var(--gray)}
.btn-row{display:flex;gap:8px;margin-top:16px;flex-wrap:wrap}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--text);transition:all .2s}
.btn:hover{border-color:var(--blue);color:var(--blue)}
.btn-primary{background:var(--blue);color:white;border-color:var(--blue)}
.btn-primary:hover{opacity:.9}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:rgba(239,68,68,.1)}
.btn-success{border-color:var(--green);color:var(--green)}
.btn-success:hover{background:rgba(34,197,94,.1)}
.bottom-panels{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:16px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px}
.panel-title{font-size:14px;font-weight:700;margin-bottom:12px}
.panel-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px}
.toast{position:fixed;bottom:24px;right:24px;padding:12px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:1000;animation:slideIn .3s;box-shadow:0 4px 12px rgba(0,0,0,.3)}
.toast-success{background:var(--green);color:white}
.toast-info{background:var(--blue);color:white}
.toast-warn{background:var(--yellow);color:#000}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;max-width:400px;width:90%}
.modal h3{margin-bottom:16px}
.modal input{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;margin-bottom:12px;outline:none}
@media(max-width:900px){.main{grid-template-columns:1fr}.sidebar{max-height:40vh}.bottom-panels{grid-template-columns:1fr}}
</style>
</head>

function renderStats(){const cards=MOCK;const buy=cards.filter(c=>c.direction==="long"&&(c.finalAction==="BUY"||c.finalAction==="STRONG_BUY")).length;const sell=cards.filter(c=>c.direction==="short"&&(c.finalAction==="SELL"||c.finalAction==="STRONG_SELL")).length;const watch=cards.filter(c=>c.finalAction==="WATCH").length;const block=cards.filter(c=>c.finalAction==="BLOCK").length;document.getElementById("statsBar").innerHTML=`
<div class="stat-item"><span class="stat-num blue">${cards.length}</span><span class="stat-label">今日机会</span></div>
<div class="stat-item"><span class="stat-num green">${buy+sell}</span><span class="stat-label">可做交易</span></div>
<div class="stat-item"><span class="stat-num yellow">${watch}</span><span class="stat-label">观察中</span></div>
<div class="stat-item"><span class="stat-num gray">${block}</span><span class="stat-label">禁止</span></div>
<div class="stat-item"><span class="stat-num ${RISK_MOCK.todayPnl>=0?"green":"red"}">${RISK_MOCK.todayPnl>=0?"+":""}${fmt(RISK_MOCK.todayPnl)}</div><span class="stat-label">今日盈亏</span></div>`;const rb=document.getElementById("riskBadge");const rs=RISK_MOCK.riskStatus;rb.textContent={normal:"风险正常",warning:"风险警告",blocked:"禁止开仓"}[rs];rb.className="risk-badge risk-"+rs}
function renderFilters(){const actions=["ALL","STRONG_BUY","BUY","WATCH","SELL","STRONG_SELL","BLOCK"];const labels={ALL:"全部",STRONG_BUY:"强做多",BUY:"可做多",WATCH:"观察",SELL:"可做空",STRONG_SELL:"强做空",BLOCK:"不做"};document.getElementById("filterRow").innerHTML=actions.map(a=>`<button class="filter-btn ${filter===a?"active":""}" onclick="setFilter('${a}')">${labels[a]}</button>`).join("")}
function setFilter(f){filter=f;renderFilters();renderList()}
function renderList(){let items=MOCK;if(filter!=="ALL")items=items.filter(c=>c.finalAction===filter);if(searchTerm){const s=searchTerm.toUpperCase();items=items.filter(c=>c.symbol.includes(s)||c.name.includes(s))}items.sort((a,b)=>b.score-a.score);document.getElementById("oppList").innerHTML=items.length?items.map(c=>{const ac=getActionColor(c.finalAction);return`<div class="opp-item ${selectedId===c.id?"selected":""}" onclick="selectCard('${c.id}')">
<div><div class="opp-symbol">${c.symbol} ${c.name}</div><div class="opp-dir">${c.direction==="long"?"做多":c.direction==="short"?"做空":c.direction==="watch"?"观察":"禁止"} · ${c.tier}</div></div>
<div class="opp-right"><div class="opp-score" style="color:${getRatingColor(c.rating)}">${c.score}</div><div class="opp-badge" style="background:${ac}22;color:${ac}">${getActionLabel(c.finalAction)}</div></div>
</div>`}).join(""):'<div style="padding:40px;text-align:center;color:var(--muted)">无匹配结果</div>'}
function selectCard(id){selectedId=id;renderList();renderDetail()}
function renderDetail(){const c=MOCK.find(x=>x.id===selectedId);if(!c){document.getElementById("contentArea").innerHTML='<div class="detail-empty">← 点击左侧品种查看交易建议</div>';return}const ac=getActionColor(c.finalAction);const rc=getRatingColor(c.rating);
const rangeLeft=Math.min(50,Math.max(5,50-c.rangePct*3));
const pricePos=c.rangePct>0?((c.currentPrice-c.predLow)/(c.predHigh-c.predLow)*100):50;
let stopStatusColor="green";if(c.stopStatus==="too_narrow")stopStatusColor="yellow";else if(c.stopStatus==="too_wide")stopStatusColor="yellow";else if(c.stopStatus==="fallback")stopStatusColor="blue";
const scoreColor=c.rating==="A"?"var(--green)":c.rating==="B"?"var(--blue)":c.rating==="C"?"var(--yellow)":"var(--red)";
const finalClass=c.finalAction.includes("BUY")?"final-buy":c.finalAction.includes("SELL")?"final-sell":c.finalAction==="WATCH"?"final-watch":"final-none";

document.getElementById("contentArea").innerHTML=`<div class="detail-card">
<div class="detail-header">
<div><div class="detail-title">${c.symbol} ${c.name}</div>
<div class="detail-meta">
<span class="opp-badge" style="background:${ac}22;color:${ac};font-size:14px;padding:6px 16px">${getActionLabel(c.finalAction)}</span>
<span class="opp-badge" style="background:${rc}22;color:${rc};font-size:14px;padding:6px 16px">${c.rating} ${getRatingLabel(c.rating)}</span>
<span style="color:var(--muted);font-size:13px">评分 ${c.score}/100</span>
</div></div>
<div class="detail-price" style="color:${c.direction==="long"?"var(--red)":"var(--green)"}">${fmt(c.currentPrice,c.currentPrice>1000?0:1)}</div>
</div>

<div class="section">
<div class="section-title">v530 未来2天预测</div>
<div class="row"><span class="label">当前价</span><span class="value">${fmt(c.currentPrice,c.currentPrice>1000?0:1)}</span></div>
<div class="row"><span class="label">预测高点</span><span class="value green">+${fmt(c.upsidePct,1)}% → ${fmt(c.predHigh,c.predHigh>1000?0:1)}</span></div>
<div class="row"><span class="label">预测低点</span><span class="value red">-${fmt(c.downsidePct,1)}% → ${fmt(c.predLow,c.predLow>1000?0:1)}</span></div>
<div class="row"><span class="label">波动范围</span><span class="value">${fmt(c.rangePct,1)}% <span style="color:${c.rangeLevel==="normal"?"var(--green)":c.rangeLevel==="too_small"?"var(--red)":"var(--yellow)"}">(${c.rangeLevel==="normal"?"正常":c.rangeLevel==="too_small"?"太小":c.rangeLevel==="too_large"?"过大":"观察"})</span></span></div>
<div class="range-bar">
<div class="range-fill" style="left:${rangeLeft}%;right:${rangeLeft}%"></div>
<div class="range-marker" style="left:${pricePos}%" title="当前价"></div>
<div class="range-label" style="left:0%">${fmt(c.predLow,c.predLow>1000?0:1)}</div>
<div class="range-label" style="left:${pricePos}%">${fmt(c.currentPrice,c.currentPrice>1000?0:1)}</div>
<div class="range-label" style="left:100%">${fmt(c.predHigh,c.predHigh>1000?0:1)}</div>
</div>
</div>

<div class="section">
<div class="section-title">SymbolFilter 方向过滤</div>
<div class="row"><span class="label">方向</span><span class="value">${c.direction==="long"?"做多":"做空"}</span></div>
<div class="row"><span class="label">是否允许</span><span class="value ${c.symbolAllowed?"green":"red"}">${c.symbolAllowed?"允许":"不允许"}</span></div>
<div class="row"><span class="label">层级</span><span class="value">${c.tier}</span></div>
<div class="row"><span class="label">历史胜率</span><span class="value">${fmt(c.winRate,1)}%</span></div>
<div class="row"><span class="label">样本数</span><span class="value">${c.sampleSize}</span></div>
<div class="row"><span class="label">平均盈利</span><span class="value green">+${fmt(c.avgWinPct,1)}%</span></div>
<div class="row"><span class="label">平均亏损</span><span class="value red">-${fmt(c.avgLossPct,1)}%</span></div>
<div class="row"><span class="label">盈亏比</span><span class="value ${c.riskReward>=1.5?"green":c.riskReward>=1?"yellow":"red"}">${fmt(c.riskReward,2)}</span></div>
<div class="row"><span class="label">近期状态</span><span class="value ${c.recentStatus==="normal"?"green":"yellow"}">${c.recentStatus==="normal"?"正常":"衰减"}</span></div>
</div>

<div class="section">
<div class="section-title">ATR 止损校验</div>
<div class="row"><span class="label">ATR(14)</span><span class="value">${fmt(c.atrValue,c.atrValue>100?0:2)}</span></div>
<div class="row"><span class="label">v530止损距离</span><span class="value">${fmt(c.v530StopDistancePct,1)}%</span></div>
<div class="row"><span class="label">ATR建议止损</span><span class="value">${fmt(c.atrStopDistancePct,1)}%</span></div>
<div class="row"><span class="label">比例</span><span class="value">${fmt(c.v530StopDistancePct/c.atrStopDistancePct,2)}</span></div>
<div class="row"><span class="label">判断</span><span class="value" style="color:var(--${stopStatusColor})">${c.stopStatus==="normal"?"正常":c.stopStatus==="too_narrow"?"止损偏窄":c.stopStatus==="too_wide"?"止损偏宽":"ATR兜底"}</span></div>
</div>

<div class="section">
<div class="section-title">风险收益</div>
<div class="row"><span class="label">止盈价</span><span class="value green">${fmt(c.takeProfitPrice,c.takeProfitPrice>1000?0:1)} (+${fmt(c.takeProfitPct,1)}%)</span></div>
<div class="row"><span class="label">止损价</span><span class="value red">${fmt(c.stopLossPrice,c.stopLossPrice>1000?0:1)} (-${fmt(c.stopLossPct,1)}%)</span></div>
<div class="row"><span class="label">风险收益比</span><span class="value ${c.riskReward>=1.5?"green":c.riskReward>=1?"yellow":"red"}">${fmt(c.riskReward,2)}</span></div>
</div>

<div class="section">
<div class="section-title">交易评分</div>
<div class="row"><span class="label">总分</span><span class="value" style="color:${scoreColor};font-size:18px">${c.score} / 100</span></div>
<div class="score-bar-wrap"><div class="score-bar-label"><span>v530波动</span><span>${Math.round(c.rangePct/5*25)}/25</span></div><div class="score-bar"><div class="score-bar-fill" style="width:${c.rangePct/5*100}%;background:${scoreColor}"></div></div></div>
<div class="score-bar-wrap"><div class="score-bar-label"><span>方向质量</span><span>${Math.round(c.winRate/100*35)}/35</span></div><div class="score-bar"><div class="score-bar-fill" style="width:${c.winRate}%;background:${scoreColor}"></div></div></div>
<div class="score-bar-wrap"><div class="score-bar-label"><span>止损合理性</span><span>${c.stopStatus==="normal"?20:c.stopStatus==="too_narrow"?10:8}/20</span></div><div class="score-bar"><div class="score-bar-fill" style="width:${c.stopStatus==="normal"?100:c.stopStatus==="too_narrow"?50:40}%;background:${scoreColor}"></div></div></div>
<div class="score-bar-wrap"><div class="score-bar-label"><span>风险收益比</span><span>${Math.round(c.riskReward/2.5*20)}/20</span></div><div class="score-bar"><div class="score-bar-fill" style="width:${Math.min(100,c.riskReward/2.5*100)}%;background:${scoreColor}"></div></div></div>
</div>

<div class="section">
<div class="section-title">仓位建议</div>
<div class="row"><span class="label">账户资金</span><span class="value">$200,000</span></div>
<div class="row"><span class="label">建议保证金</span><span class="value">${c.suggestedMarginPctMin}-${c.suggestedMarginPctMax}%</span></div>
<div class="row"><span class="label">理论止损亏损</span><span class="value red">-${fmt(c.stopLossPct*(c.suggestedMarginPctMin+c.suggestedMarginPctMax)/200,2)}%</span></div>
<div class="row"><span class="label">说明</span><span class="value" style="max-width:60%;text-align:right">${c.positionComment}</span></div>
</div>

<div class="final-box ${finalClass}">
<strong>💡 最终建议：</strong><br>${c.finalSuggestion}
${c.warnings.length?"<br><br><strong>⚠️ 风险提示：</strong><br>"+c.warnings.map(w=>"· "+w).join("<br>"):""}
</div>

<div class="btn-row">
<button class="btn btn-primary" onclick="adoptCard('${c.id}')">采纳建议</button>
<button class="btn" onclick="watchCard('${c.id}')">加入观察</button>
<button class="btn btn-success" onclick="recordResult('${c.id}')">记录结果</button>
<button class="btn btn-danger" onclick="ignoreCard('${c.id}')">忽略</button>
</div>

<div class="bottom-panels">
<div class="panel">
<div class="panel-title">风险控制</div>
<div class="panel-row"><span>今日建议</span><span>${RISK_MOCK.todayOpportunityCount}</span></div>
<div class="panel-row"><span>已采纳</span><span>${RISK_MOCK.todayAcceptedCount}</span></div>
<div class="panel-row"><span>今日盈亏</span><span style="color:${RISK_MOCK.todayPnl>=0?"var(--green)":"var(--red)"}">${RISK_MOCK.todayPnl>=0?"+":""}${fmt(RISK_MOCK.todayPnl)}</span></div>
<div class="panel-row"><span>持仓数量</span><span>${RISK_MOCK.currentPositionCount}</span></div>
<div class="panel-row"><span>保证金占用</span><span>${RISK_MOCK.currentMarginPct}%</span></div>
<div class="panel-row"><span>风险状态</span><span style="color:var(--${RISK_MOCK.riskStatus==="normal"?"green":RISK_MOCK.riskStatus==="warning"?"yellow":"red"})">${RISK_MOCK.riskStatus==="normal"?"正常":RISK_MOCK.riskStatus==="warning"?"警告":"禁止开仓"}</span></div>
</div>
<div class="panel">
<div class="panel-title">每日复盘</div>
<div class="panel-row"><span>建议数</span><span>${REVIEW_MOCK.suggestionCount}</span></div>
<div class="panel-row"><span>采纳数</span><span>${REVIEW_MOCK.acceptedCount}</span></div>
<div class="panel-row"><span>盈利</span><span style="color:var(--green)">${REVIEW_MOCK.winCount}</span></div>
<div class="panel-row"><span>亏损</span><span style="color:var(--red)">${REVIEW_MOCK.lossCount}</span></div>
<div class="panel-row"><span>v530覆盖率</span><span>${REVIEW_MOCK.v530CoverageRate}%</span></div>
<div class="panel-row"><span>重点观察</span><span style="color:var(--yellow)">${REVIEW_MOCK.watchSymbols.join(", ")||"--"}</span></div>
</div>
</div>
</div>`}
function adoptCard(id){RISK_MOCK.todayAcceptedCount++;toast("已采纳建议，不自动下单","success")}
function watchCard(id){toast("已加入观察列表","info")}
function recordResult(id){const overlay=document.createElement("div");overlay.className="modal-overlay";overlay.innerHTML=`<div class="modal"><h3>记录交易结果</h3><div id="resultType-chips"></div><input id="resultPnl" placeholder="盈亏金额 (可选)" type="number"><div class="btn-row"><button class="btn btn-primary" onclick="submitResult('${id}')">确认</button><button class="btn" onclick="this.closest('.modal-overlay').remove()">取消</button></div></div>`;document.body.appendChild(overlay);ChipSelect.mount("resultType-chips",[{value:"win",label:"盈利"},{value:"loss",label:"亏损"},{value:"flat",label:"未交易"},{value:"tp",label:"止盈"},{value:"sl",label:"止损"},{value:"manual",label:"手动退出"}],{value:"win",wrap:true,className:"modal-chips"})}
function submitResult(id){document.querySelector(".modal-overlay")?.remove();toast("交易结果已记录","success")}
function ignoreCard(id){toast("已忽略","info")}
document.getElementById("searchBox").addEventListener("input",e=>{searchTerm=e.target.value;renderList()});
updateClock();setInterval(updateClock,1000);renderStats();renderFilters();renderList();
</script>
</body>
</html>
